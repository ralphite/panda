<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Panda Crop</title>
    <link rel="stylesheet" href="capture.css" />
  </head>
  <body>
    <header>
      <div>
        <strong>Panda Crop</strong>
        <span id="title">Loading</span>
      </div>
      <div class="actions">
        <button id="reset" type="button">Reset</button>
        <button id="upload" type="button" disabled>Upload</button>
      </div>
    </header>
    <main>
      <div id="message">Loading capture</div>
      <div id="stage" hidden>
        <img id="screenshot" alt="Full page screenshot" />
        <canvas id="overlay"></canvas>
      </div>
    </main>
    <script src="capture.js"></script>
  </body>
</html>
